# fly.toml app configuration file generated for adamantgolang
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.

app = 'adamantgolang'
primary_region = 'arn'

[build]

[env]
  PORT = '3400'

[http_service]
  internal_port = 3400
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '2gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 2048